name: Multi Steps
on: [push]
jobs:
  multi_steps:
    run-on: ubuntu-latest
    env:
      GITHUB_REF : ${{ github.ref }}
    steps:
      - name: Step 0
        uses: actions/checkout@v3
      - name: Step 1
        run: echo "Hello Github Actions multi-Steps"
      - name: Step 2
        run: date
      - name: Step 3
        run: |
          echo "Branche actuelle : $GITHUB_REF"
      - name: Step 4
        run: ls